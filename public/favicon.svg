<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="20" fill="#0A0309"/>
  <!-- Vault outer ring -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="#A9927D" stroke-width="3" opacity="0.8"/>
  <!-- Vault door body -->
  <circle cx="50" cy="50" r="28" fill="none" stroke="#A9927D" stroke-width="2.5"/>
  <circle cx="50" cy="50" r="28" fill="rgba(169,146,125,0.08)"/>
  <!-- Vault handle spokes -->
  <line x1="50" y1="22" x2="50" y2="36" stroke="#A9927D" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="50" y1="64" x2="50" y2="78" stroke="#A9927D" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="22" y1="50" x2="36" y2="50" stroke="#A9927D" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="64" y1="50" x2="78" y2="50" stroke="#A9927D" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Diagonal spokes -->
  <line x1="29.7" y1="29.7" x2="39.6" y2="39.6" stroke="#A9927D" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="60.4" y1="60.4" x2="70.3" y2="70.3" stroke="#A9927D" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="70.3" y1="29.7" x2="60.4" y2="39.6" stroke="#A9927D" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="29.7" y1="70.3" x2="39.6" y2="60.4" stroke="#A9927D" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <!-- Center lock -->
  <circle cx="50" cy="50" r="8" fill="#A9927D" opacity="0.9"/>
  <circle cx="50" cy="50" r="4" fill="#0A0309"/>
  <!-- Glow -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="#A9927D" stroke-width="1" opacity="0.2"/>
</svg>