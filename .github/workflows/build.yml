name: Centcible — Build & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-web:
    name: Build Web App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Vite web app
        run: npm run build

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: centcible-web-build
          path: dist/

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: build-web
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Build Vite web app
        run: npm run build

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build Android Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: centcible-android-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-web, build-android]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: centcible-web-build
          path: dist/

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: centcible-android-debug

      - name: Zip web build
        run: zip -r centcible-web.zip dist/

      - name: Get short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v0.1.0-${{ steps.sha.outputs.short }}"
          name: "Centcible Release v0.1.0"
          body: |
            ## 🏆 Centcible — Luxury Expense Tracker

            This release includes:
            - ✅ Web build (deploy to any static host)
            - ✅ Android Debug APK (install on any Android device)
            - 🍎 iOS — Open `ios/` in Xcode on macOS to build

            ### How to install the Android APK
            1. Download `app-debug.apk`
            2. Transfer to your Android phone
            3. Enable "Install from unknown sources" in settings
            4. Tap the APK to install

            Built from commit: `${{ github.sha }}`
          files: |
            centcible-web.zip
            app-debug.apk
